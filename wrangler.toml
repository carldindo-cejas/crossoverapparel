name = "crossover-apparel"
account_id = "8e226d91f14776d424e51ec885e88f85"
main = "worker-entrypoint.mjs"
compatibility_date = "2026-03-25"
compatibility_flags = ["nodejs_compat"]

[assets]
binding = "ASSETS"
directory = ".open-next/assets"

[vars]
APP_NAME = "Crossover Apparel"
APP_ENV = "production"
REALTIME_API_URL = "https://crossover-apparel.cejascarldindo.workers.dev"
# R2_PUBLIC_BASE_URL = "https://your-r2-public-domain.com"

# IMPORTANT: Do NOT put secrets in this file.
# Run these commands to set secrets securely:
#   wrangler secret put AUTH_SECRET
#   wrangler secret put REALTIME_API_TOKEN
#   wrangler secret put SEED_KEY

[[d1_databases]]
binding = "DB"
database_name = "crossover-apparel-db"
database_id = "57c71837-1e93-4bda-a412-987ef1856a45"

[[r2_buckets]]
binding = "PRODUCT_IMAGES"
bucket_name = "crossover-product-images"

[[r2_buckets]]
binding = "ORDER_FILES"
bucket_name = "crossover-order-files"

[[durable_objects.bindings]]
name = "PRESENCE_HUB"
class_name = "PresenceHub"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["PresenceHub"]